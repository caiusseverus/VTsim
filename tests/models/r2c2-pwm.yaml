name: r2c2-pwm
description: To match Heating Simulator Weather in HA
model:
  model_type: r2c2
  control_mode: pwm
  initial_temperature: 18
  external_temperature_fixed: 5
  heater_power_watts_r2c2: 1100
  c_air: 1000000
  c_fabric: 75000000
  r_fabric: 0.005
  r_ext: 0.06
  r_infiltration: 0.25
  window_area_m2: 2
  window_transmittance: 0.6
  solar_irradiance_fixed: 0
simulation:
  duration_hours: 72
  step_seconds: 10
  record_every_seconds: 10
  initial_hvac_mode: heat
  initial_preset_mode: eco
sensor:
  lag_tau: 15
  bias: 0
  noise_std_dev: 0
  quantisation: 0
  update_rate_s: 60
  min_interval_s: 0
  max_interval_s: 0
  delta: 0
disturbances:
  ext_temp_profile:
    enabled: false
    base: 5
    amplitude: 3
    min_hour: 5.5
    max_hour: 14.5
  occupancy:
    enabled: false
    max_occupants: 2
    cooking_power_w: 0
    cooking_duration_s: 1200
    cooking_events_per_day: 2
    seed: 42
  weather:
    wind_speed_m_s: 4
    wind_coefficient: 0.05
    rain_intensity: 0.5
    rain_moisture_factor: 0.5
