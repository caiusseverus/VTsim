name: PWM Simple (SmartPI)
description: Simple R1C1 model, SmartPI — harness smoke test
model:
  model_type: simple
  control_mode: pwm
  initial_temperature: 18
  external_temperature_fixed: 5
  heater_power_watts: 1500
  heat_loss_coefficient: 30
  thermal_mass: 4060638.9
